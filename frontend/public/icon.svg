<svg width="192" height="192" viewBox="0 0 192 192" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="192" y2="192" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="plate" x1="56" y1="72" x2="136" y2="136" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="192" height="192" rx="40" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <line x1="96" y1="0" x2="96" y2="192" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="0" y1="96" x2="192" y2="96" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>

  <!-- Plate circle -->
  <circle cx="96" cy="100" r="52" fill="url(#plate)" opacity="0.08"/>
  <circle cx="96" cy="100" r="52" stroke="url(#plate)" stroke-width="1.5" fill="none" opacity="0.2"/>

  <!-- Fork (left) -->
  <g transform="translate(62, 52)">
    <!-- Handle -->
    <rect x="9" y="52" width="6" height="36" rx="3" fill="white" opacity="0.9"/>
    <!-- Neck -->
    <rect x="10.5" y="38" width="3" height="16" rx="1.5" fill="white" opacity="0.9"/>
    <!-- Tines -->
    <rect x="7" y="20" width="2.5" height="20" rx="1.25" fill="white" opacity="0.9"/>
    <rect x="11.25" y="20" width="2.5" height="20" rx="1.25" fill="white" opacity="0.9"/>
    <rect x="15.5" y="20" width="2.5" height="20" rx="1.25" fill="white" opacity="0.9"/>
  </g>

  <!-- Knife (right) -->
  <g transform="translate(116, 52)">
    <!-- Handle -->
    <rect x="5" y="52" width="6" height="36" rx="3" fill="white" opacity="0.9"/>
    <!-- Blade -->
    <path d="M5.5 20 Q5.5 20 11 28 L11 52 L5.5 52 Z" fill="white" opacity="0.9"/>
  </g>

  <!-- Accent dot top-right -->
  <circle cx="138" cy="54" r="6" fill="url(#accent)"/>
  <circle cx="138" cy="54" r="3" fill="white" opacity="0.6"/>

  <!-- Brand initial "Q" — subtle -->
  <text x="96" y="108" text-anchor="middle" font-family="'SF Pro Display', 'Inter', system-ui, sans-serif"
    font-size="28" font-weight="700" letter-spacing="-1" fill="white" opacity="0.12">QR</text>
</svg>
